_BASE_: "./t4_train_distill.yaml"
OUTPUT_DIR: "./output/t4_replay_distill"
MODEL:
  WEIGHTS: "./output/t4_distill/model_final.pth"
SOLVER:
  STEPS: (155500, 156500)
  MAX_ITER: 160500
  WARMUP_ITERS: 0
OWOD:
  ENABLE_CLUSTERING: False
  INCREMENTAL:
    DISTILLATION:
      ENABLED: True
      TEACHER_WEIGHTS: "./output/t3_distill/model_final.pth"
      TEMPERATURE: 2.0
      CLS_WEIGHT: 1.0
      BBOX_WEIGHT: 1.0
    REPLAY:
      ENABLED: True
      TRAIN_DATASET: "t4_voc_coco_2007_ft"
